name: Bug report
description: Report a reproducible problem in Caret
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Caret. Please search existing issues before submitting a new report.

  - type: input
    id: version
    attributes:
      label: Caret version
      description: Run `caret --version`, or provide the commit SHA if building from source.
      placeholder: "caret 0.5.0"
    validations:
      required: true

  - type: input
    id: operating-system
    attributes:
      label: Operating system
      placeholder: "Windows 11 24H2, Ubuntu 24.04, macOS 15, etc."
    validations:
      required: true

  - type: input
    id: terminal
    attributes:
      label: Terminal and shell
      description: Include both the terminal emulator and shell when known.
      placeholder: "Windows Terminal with PowerShell 7"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Problem description
      description: Clearly describe what went wrong.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reliable sequence that causes the problem.
      placeholder: |
        1. Open Caret with `caret path/to/project`
        2. Press ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: diagnostics
    attributes:
      label: Logs, screenshots, or recordings
      description: Drag files here if useful. Remove passwords, tokens, private paths, and other sensitive information.

  - type: dropdown
    id: reproducibility
    attributes:
      label: How often does this happen?
      options:
        - Every time
        - Often
        - Sometimes
        - Once
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for duplicates.
          required: true
        - label: I removed sensitive information from this report.
          required: true
        - label: This is a bug report, not a security vulnerability.
          required: true
