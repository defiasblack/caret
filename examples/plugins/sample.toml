name = "Caret sample tools"
version = "0.1.0"

[[commands]]
name = "uppercase"
description = "Uppercase the current selection"
program = "powershell.exe"
args = ["-NoProfile", "-File", "uppercase.ps1"]

[[languages]]
name = "Caret Notes"
extensions = ["note"]
line_comment = "#"

[[themes]]
name = "sample-midnight"
base = "nord"

[themes.colors]
background = "#080b12"
current_line = "#141b2d"
keyword = "#ff79c6"

[hooks]
on_save = []

